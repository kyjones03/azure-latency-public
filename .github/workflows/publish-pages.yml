name: Publish GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EVENTHUB_NAMESPACE: ${{ vars.EVENTHUB_NAMESPACE }}
      EVENTHUB_NAME: ${{ vars.EVENTHUB_NAME }}
      HOPS_EVENTHUB_NAMESPACE: ${{ vars.HOPS_EVENTHUB_NAMESPACE }}
      HOPS_EVENTHUB_NAME: ${{ vars.HOPS_EVENTHUB_NAME }}
      SNAPSHOT_LOOKBACK_MINUTES: '90'
      SNAPSHOT_READ_SECONDS: '45'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build latest Event Hub snapshot
        run: npm run snapshot

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
